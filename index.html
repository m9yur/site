<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>you found it</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: black;
        color: #eaeaea;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    .btn {
        margin-top: 20px;
        padding: 12px 22px;
        border: 1px solid #444;
        background: transparent;
        color: #aaa;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        color: white;
        border-color: white;
    }

    #glitch {
        font-size: 28px;
        letter-spacing: 2px;
        animation: flicker 2s infinite;
    }

    @keyframes flicker {
        0% {opacity: 1;}
        50% {opacity: 0.4;}
        100% {opacity: 1;}
    }

    #jumpscare {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    #jumpscare img {
        width: 300px;
        max-width: 80%;
    }

    #after {
        display: none;
        margin-top: 20px;
        font-size: 14px;
        color: #888;
    }
</style>
</head>

<body>

<div class="center" id="main">
    <div id="glitch">you weren’t supposed to find this</div>
    <button class="btn" onclick="start()">click me</button>
</div>

<div id="jumpscare">
    <img src="https://i.imgur.com/8p0XH0Q.png">
    <audio id="sound" src="https://www.myinstants.com/media/sounds/scream.mp3"></audio>
    <div id="after">lol relax. you good.</div>
</div>

<script>
function start() {
    document.getElementById("main").style.display = "none";

    setTimeout(() => {
        document.getElementById("jumpscare").style.display = "flex";
        document.getElementById("sound").play();

        setTimeout(() => {
            document.getElementById("after").style.display = "block";
        }, 1500);

    }, 1500);
}
</script>

</body>
</html>
