<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>are you sure</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    color: #e5e5e5;
    font-family: monospace;
    overflow: hidden;
}

#stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    text-align: center;
}

h1 {
    letter-spacing: 3px;
    animation: flicker 1.5s infinite;
}

@keyframes flicker {
    0% {opacity: 1;}
    50% {opacity: 0.2;}
    100% {opacity: 1;}
}

.btn {
    margin: 12px;
    padding: 14px 30px;
    border-radius: 6px;
    border: 1px solid rgba(255,0,0,0.6);
    background: rgba(255,0,0,0.08);
    color: #ff6b6b;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    background: rgba(255,0,0,0.2);
    color: #fff;
}

#no {
    position: absolute;
}

#screen {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

#gif {
    width: 420px;
    max-width: 90%;
    opacity: 0;
    filter: contrast(1.4) brightness(0.7);
}

#msg {
    margin-top: 20px;
    font-size: 14px;
    color: #888;
}

#bar {
    width: 200px;
    height: 6px;
    border: 1px solid #333;
    margin-top: 20px;
}

#fill {
    height: 100%;
    width: 0%;
    background: red;
}

.glitch {
    animation: shake 0.07s infinite;
}

@keyframes shake {
    0% {transform: translate(0,0);}
    25% {transform: translate(-4px,4px);}
    50% {transform: translate(4px,-4px);}
    75% {transform: translate(-4px,-4px);}
    100% {transform: translate(4px,4px);}
}

.redflash {
    background: red !important;
}
</style>
</head>

<body>

<div id="stage">
    <div class="card" id="card">
        <h1 id="title">don’t click</h1>
        <button class="btn" id="yes">yes</button>
        <button class="btn" id="no">no</button>
    </div>
</div>

<div id="screen">
    <img id="gif" src="scary.gif">
    <audio id="heartbeat" src="https://www.myinstants.com/media/sounds/heartbeat.mp3"></audio>
    <audio id="scream" src="https://www.myinstants.com/media/sounds/scream.mp3"></audio>
    <div id="msg"></div>
    <div id="bar"><div id="fill"></div></div>
</div>

<script>
let noBtn = document.getElementById("no");
let yesBtn = document.getElementById("yes");
let title = document.getElementById("title");

let steps = 0;

// NO runs away
noBtn.addEventListener("mouseover", () => {
    let x = Math.random() * 80;
    let y = Math.random() * 80;
    noBtn.style.left = x + "%";
    noBtn.style.top = y + "%";
});

// YES progression
yesBtn.addEventListener("click", () => {
    steps++;

    if (steps === 1) {
        title.textContent = "are you sure";
        return;
    }

    if (steps === 2) {
        title.textContent = "are you really sure";
        return;
    }

    if (steps === 3) {
        title.textContent = "last chance";
        return;
    }

    start();
});

function start() {
    document.getElementById("card").style.display = "none";
    let screen = document.getElementById("screen");
    let gif = document.getElementById("gif");
    let msg = document.getElementById("msg");
    let fill = document.getElementById("fill");

    screen.style.display = "flex";

    let hb = document.getElementById("heartbeat");
    hb.volume = 0.2;
    hb.play();

    let progress = 0;

    let load = setInterval(() => {
        progress += 2;
        fill.style.width = progress + "%";
        msg.textContent = "loading " + progress + "%";

        if (progress >= 100) {
            clearInterval(load);
        }
    }, 60);

    setTimeout(() => {
        document.body.classList.add("redflash");
        setTimeout(() => document.body.classList.remove("redflash"), 80);
    }, 2000);

    setTimeout(() => {
        gif.style.opacity = "1";
        document.body.classList.add("glitch");

        let sc = document.getElementById("scream");
        sc.volume = 1;
        sc.play();
    }, 2600);

    setTimeout(() => {
        document.body.classList.remove("glitch");
        msg.textContent = "relax. you clicked it.";
    }, 5200);
}
</script>

</body>
</html>
